services:
  nginx:
    image: nginx:alpine
    container_name: emoeat-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    depends_on:
      - php
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: emoeat-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt

  php:
    build: .
    container_name: emoeat-php
    expose:
      - "80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "1521"
      DB_SERVICE: XEPDB1
      DB_USER: emoeat_user
      DB_PASSWORD: emoeat_pass

  db:
    image: gvenzl/oracle-xe:21-slim
    container_name: emoeat-oracle
    restart: unless-stopped
    environment:
      ORACLE_PASSWORD: oracle_root
      APP_USER: emoeat_user
      APP_USER_PASSWORD: emoeat_pass
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./docker/init.sql:/container-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  oracle_data:
  certbot_www:
  certbot_conf:
