services:
  nginx:
    image: nginx:alpine
    container_name: emoeat-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-ssl.conf:/etc/nginx/conf.d/default.conf
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    depends_on:
      - php
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: emoeat-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt

  php:
    build: .
    container_name: emoeat-php
    expose:
      - "80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME:-emoeat}
      DB_USER: ${DB_USER:-emoeat_user}
      DB_PASSWORD: ${DB_PASSWORD:-emoeat_pass}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_FROM: ${SMTP_FROM:-noreply@emoeat.health}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_TLS: ${SMTP_TLS:-on}
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: emoeat-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${DB_NAME:-emoeat}
      MYSQL_USER: ${DB_USER:-emoeat_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-emoeat_pass}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
  certbot_www:
  certbot_conf:
