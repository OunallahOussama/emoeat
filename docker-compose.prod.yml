services:
  nginx:
    image: nginx:alpine
    container_name: emoeat-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-ssl.conf:/etc/nginx/conf.d/default.conf
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    depends_on:
      - php
      - phpmyadmin
      - mailpit
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: emoeat-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt

  php:
    build: .
    container_name: emoeat-php
    expose:
      - "80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME:-emoeat}
      DB_USER: ${DB_USER:-emoeat_user}
      DB_PASSWORD: ${DB_PASSWORD:-emoeat_pass}
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_FROM: ${SMTP_FROM:-no-reply@emoeat.health}
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      SMTP_TLS: "off"
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit
    container_name: emoeat-mailpit
    restart: unless-stopped
    expose:
      - "8025"
      - "1025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
      MP_UI_AUTH: ${MAILPIT_USER:-admin}:${MAILPIT_PASSWORD:-emoeat2026!}
      MP_WEBROOT: /mailpit
      MP_SMTP_RELAY_HOST: ${SMTP_HOST:-email-smtp.us-east-1.amazonaws.com}
      MP_SMTP_RELAY_PORT: ${SMTP_PORT:-587}
      MP_SMTP_RELAY_USERNAME: ${SMTP_USER}
      MP_SMTP_RELAY_PASSWORD: ${SMTP_PASSWORD}
      MP_SMTP_RELAY_STARTTLS: "true"
      MP_SMTP_RELAY_ALL: "true"

  db:
    image: mysql:8.0
    container_name: emoeat-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${DB_NAME:-emoeat}
      MYSQL_USER: ${DB_USER:-emoeat_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-emoeat_pass}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: emoeat-phpmyadmin
    restart: unless-stopped
    expose:
      - "80"
    environment:
      PMA_HOST: db
      PMA_ABSOLUTE_URI: https://emoeat.health/phpmyadmin/
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
  certbot_www:
  certbot_conf:
